; Replit-adapted PHP configuration for Hacker Experience Legacy

; Show only real errors/warnings; suppress deprecation/strict noise from legacy PHP5-era code
error_reporting = E_ALL & ~E_DEPRECATED & ~E_NOTICE & ~E_STRICT & ~E_WARNING
display_errors = On
log_errors = On
error_log = /home/runner/workspace/.mysql/run/php-error.log

variables_order = "EGPCS"

expose_php = Off

post_max_size = 50M
upload_max_filesize = 50M

session.save_path = /home/runner/workspace/.mysql/run

[Date]
date.timezone = "UTC"
