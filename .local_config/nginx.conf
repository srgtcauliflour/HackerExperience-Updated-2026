worker_processes  1;
pid /home/runner/workspace/.mysql/run/nginx.pid;
error_log /home/runner/workspace/.mysql/run/nginx_error.log notice;

events {
    worker_connections 1024;
}

http {
    include /nix/store/8zcmz5vcaxav7cd2m33hs4bbid5y8i3b-nginx-1.28.0/conf/mime.types;
    default_type application/octet-stream;

    access_log /home/runner/workspace/.mysql/run/nginx_access.log;

    client_body_temp_path /home/runner/workspace/.mysql/run/nginx_client_temp;
    proxy_temp_path /home/runner/workspace/.mysql/run/nginx_proxy_temp;
    fastcgi_temp_path /home/runner/workspace/.mysql/run/nginx_fastcgi_temp;
    uwsgi_temp_path /home/runner/workspace/.mysql/run/nginx_uwsgi_temp;
    scgi_temp_path /home/runner/workspace/.mysql/run/nginx_scgi_temp;

    keepalive_timeout 65;
    server_tokens off;

    gzip on;
    gzip_disable "msie6";
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/x-javascript text/xml application/xml application/xml+rss text/javascript application/javascript;

    server {
        listen 0.0.0.0:5000;
        server_name _;

        sendfile off;

        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;

        client_max_body_size 50m;
        client_body_buffer_size 128k;

        root /home/runner/workspace;
        index index.php;

        location = /favicon.ico {
            log_not_found off;
            access_log off;
        }

        location = /robots.txt {
            log_not_found off;
            access_log off;
        }

        location / {
            try_files $uri $uri/ @extensionless_php;
        }

        location @extensionless_php {
            rewrite ^/(.*)$ /$1.php last;
        }

        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;

            fastcgi_buffer_size 128k;
            fastcgi_buffers 4 256k;
            fastcgi_busy_buffers_size 256k;

            fastcgi_index index.php;
            fastcgi_pass 127.0.0.1:9000;

            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include /nix/store/8zcmz5vcaxav7cd2m33hs4bbid5y8i3b-nginx-1.28.0/conf/fastcgi_params;
        }

        location ~ /\. {
            log_not_found off;
            deny all;
        }
    }
}
